name: Auto-merge to main

on:
  push:
    branches:
      - 'claude/**'
      - 'cursor/**'

permissions:
  contents: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m compileall . -q

      - name: Consistency check
        run: python scripts/check_consistency.py

      - name: Check for merge conflicts
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin main
          git checkout -B main origin/main
          git merge --no-commit --no-ff origin/${{ github.ref_name }} \
            || { git merge --abort; echo "::error::Merge conflict in ${{ github.ref_name }}"; exit 1; }
          git merge --abort 2>/dev/null || true

      - name: Merge into main
        run: |
          git checkout -B main origin/main
          git merge --no-ff origin/${{ github.ref_name }} -m "Auto-merge ${{ github.ref_name }} into main"
          git push origin main

      - name: Delete merged branch
        run: git push origin --delete "${{ github.ref_name }}"
