name: Auto-merge feature branches

# Схема: любая ветка → dev (авто) → main (только после CI)
on:
  push:
    branches-ignore:
      - main
      - dev
  workflow_run:
    workflows: ["CI"]
    branches: [dev]
    types: [completed]

jobs:
  automerge-to-dev:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge into dev
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin
          git checkout dev || git checkout -b dev
          git merge --no-ff origin/${{ github.ref_name }} -m "Auto-merge ${{ github.ref_name }} into dev"
          git push origin dev

  automerge-to-main:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge dev into main
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin
          git checkout main
          git merge --no-ff origin/dev -m "Auto-merge dev into main [CI passed]"
          git push origin main
