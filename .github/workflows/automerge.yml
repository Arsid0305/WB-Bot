name: Auto-merge

# Цепочка: claude/* → dev → main
# Каждый переход — только после успешного CI
on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - dev
      - "claude/**"
    types: [completed]

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin

      - name: claude/* → dev
        if: ${{ startsWith(github.event.workflow_run.head_branch, 'claude/') }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          git checkout dev
          git merge --no-ff origin/$BRANCH -m "Auto-merge $BRANCH into dev [CI passed]"
          git push origin dev

      - name: dev → main
        if: ${{ github.event.workflow_run.head_branch == 'dev' }}
        run: |
          git checkout main
          git merge --no-ff origin/dev -m "Auto-merge dev into main [CI passed]"
          git push origin main
