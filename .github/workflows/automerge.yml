name: Auto-merge dev into main

# Запускается только когда CI успешно завершился на ветке dev
on:
  workflow_run:
    workflows: ["CI"]
    branches: [dev]
    types: [completed]

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Только если CI прошёл успешно
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev into main
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin
          git checkout main
          git merge --no-ff origin/dev -m "Auto-merge dev into main [CI passed]"
          git push origin main
