<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReviewBot</title>
<link rel="icon" href="http://127.0.0.1:8000/static/favicon.ico" type="image/x-icon">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#f5f6f8;min-height:100vh;height:100vh;overflow:hidden}
  input,textarea,button{font-family:inherit}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-thumb{background:#d0d0d8;border-radius:3px}
</style>
</head>
<body>
<div id="root" style="height:100vh;display:flex;flex-direction:column"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = "http://127.0.0.1:8000";
const LS = {
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

const TONE_LABELS   = {neutral:"Нейтральный",friendly:"Дружелюбный 😊",creative:"Креативный ✨"};
const LENGTH_LABELS = {short:"Короткий (до 200 зн.)",medium:"Средний (до 500 зн.)",long:"Развёрнутый (до 900 зн.)"};

const PROVIDERS = {
  openai:    {label:"OpenAI",   color:"#10A37F", models:{"gpt-4o-mini":"GPT-4o mini — быстро, дёшево (~$0.0002/ответ)","gpt-4o":"GPT-4o — выше качество (~$0.003/ответ)"}, defaultModel:"gpt-4o-mini"},
  gemini:    {label:"Gemini",   color:"#4285F4", models:{"gemini-2.5-flash":"Gemini 2.5 Flash — дешевле в 2×, отличный RU (~$0.0001/ответ)"}, defaultModel:"gemini-2.5-flash"},
  anthropic: {label:"Claude",   color:"#D97706", models:{"claude-sonnet-4-6":"Claude Sonnet 4.6 — мощный и точный (~$0.0009/ответ)","claude-haiku-4-5-20251001":"Claude Haiku 4.5 — быстро и дёшево (~$0.0001/ответ)"}, defaultModel:"claude-sonnet-4-6"},
  deepseek:  {label:"DeepSeek", color:"#4F46E5", models:{"deepseek-chat":"DeepSeek V3 — без VPN, дёшево (~$0.0001/ответ)"}, defaultModel:"deepseek-chat"},
};

const THEMES = {
  wb:   {grad:"linear-gradient(135deg, #a500ff, #7b00ff)",accent:"#a500ff",accentBg:"rgba(165,0,255,0.06)",accentShadow:"rgba(165,0,255,0.12)",name:"WB",loadLabel:"↓ Загрузить отзывы с WB",apiPath:"/api/wb/reviews",sendPath:"/api/wb/send",platform:"wb"},
  ozon: {grad:"linear-gradient(135deg, #005BFF, #0041CC)",accent:"#005BFF",accentBg:"rgba(0,91,255,0.06)",accentShadow:"rgba(0,91,255,0.12)",name:"OZON",loadLabel:"↓ Загрузить отзывы с Ozon",apiPath:"/api/ozon/reviews",sendPath:"/api/ozon/send",platform:"ozon"},
};

const CARD = {background:"#fff",borderRadius:14,border:"1px solid #e6e8ec",boxShadow:"0 8px 24px rgba(0,0,0,0.05)"};

function extractFirstName(n){
  if(!n?.trim())return"";
  const f=n.trim().split(/\s+/)[0];
  return /^[А-ЯЁA-Z][а-яёa-z]{1,14}$/.test(f)?f:"";
}
function hasContent(r){return!!(r.pros?.trim()||r.cons?.trim()||r.comment?.trim()||r.photos?.length||r.videoUrl)}
async function apiFetch(path,opts={}){
  const res=await fetch(API+path,{headers:{"Content-Type":"application/json"},...opts});
  const data=await res.json();
  if(!res.ok||!data.ok)throw new Error(data.error||`HTTP ${res.status}`);
  return data;
}

const IcoStar=({filled,size=22})=>(<span style={{fontSize:size,color:filled?"#ffb84d":"#e6e6e6",textShadow:filled?"0 1px 4px rgba(255,184,77,0.35)":"none",lineHeight:1,display:"inline-block"}}>&#9733;</span>);
const IcoSparkle=()=>(<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>);
const IcoSettings=()=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>);
const IcoBack=()=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>);
const IcoCheck=()=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>);
const IcoPlus=()=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>);
const IcoTrash=()=>(<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>);
const IcoSend=()=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>);

const inp={width:"100%",padding:"8px 12px",border:"1.5px solid #d9dbe0",borderRadius:8,fontSize:14,color:"#1a1a1a",background:"#fafafa",transition:"all 0.15s",fontFamily:"inherit"};
const lbl={display:"block",fontSize:12,fontWeight:600,color:"#444",marginBottom:3};

function Stars({count,size=22}){return<span style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(i=><IcoStar key={i} filled={i<=count} size={size}/>)}</span>;}
function StarPicker({value,onChange,size=28}){
  const[hover,setHover]=useState(0);
  return<div style={{display:"flex",gap:4}}>{[1,2,3,4,5].map(n=><button key={n} type="button" onMouseEnter={()=>setHover(n)} onMouseLeave={()=>setHover(0)} onClick={()=>onChange(n)} style={{background:"none",border:"none",cursor:"pointer",padding:2,lineHeight:1}}><IcoStar filled={(hover||value)>=n} size={size}/></button>)}</div>;
}

function PlatformBadge({platform}){
  const t=THEMES[platform]||THEMES.wb;
  return<span style={{display:"inline-block",padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:600,color:"#fff",background:t.grad,marginBottom:8}}>{t.name}</span>;
}

function PrimBtn({onClick,disabled,children,grad}){
  return<button onClick={onClick} disabled={disabled} style={{padding:"13px 20px",background:disabled?"#e6e8ec":grad,color:disabled?"#999":"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:600,cursor:disabled?"not-allowed":"pointer",transition:"all 0.2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%"}}>{children}</button>;
}

function PlatformSwitch({current,onChange}){
  return(
    <div style={{display:"flex",background:"rgba(255,255,255,0.15)",borderRadius:12,padding:4,gap:4}}>
      {["wb","ozon"].map(p=>(
        <button key={p} onClick={()=>onChange(p)}
          style={{padding:"6px 18px",borderRadius:9,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all 0.2s",
            background:current===p?"#fff":"transparent",
            color:current===p?THEMES[p].accent:"rgba(255,255,255,0.75)"}}>
          {THEMES[p].name}
        </button>
      ))}
    </div>
  );
}

function SetupScreen({initial,isEdit,onSave,onBack,theme}){
  const t=theme||THEMES.wb;
  const[form,setForm]=useState(initial||{brandName:"",tone:"friendly",responseLength:"medium",provider:"openai",model:"gpt-4o-mini",signature:"",customInstructions:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const valid=form.brandName.trim().length>0;
  const activeProv=PROVIDERS[form.provider]||PROVIDERS.openai;
  return(
    <div style={{minHeight:"100vh",background:"#f5f6f8"}}>
      <div style={{background:t.grad,padding:"0 24px",display:"flex",alignItems:"center",gap:12}}>
        {isEdit&&<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",padding:"16px 4px",display:"flex"}}><IcoBack/></button>}
        <span style={{color:"#fff",fontWeight:700,fontSize:16,padding:"16px 0"}}>{isEdit?"Настройки бренда":"Настройка бота"}</span>
      </div>
      <div style={{padding:"10px 16px",maxWidth:520,margin:"0 auto"}}>
        <div style={{...CARD,padding:16,display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <label style={lbl}>Название бренда <span style={{color:t.accent}}>*</span></label>
            <input style={inp} placeholder="Organic Lab" value={form.brandName} onChange={e=>set("brandName",e.target.value)}
              onFocus={e=>{e.target.style.borderColor=t.accent;e.target.style.boxShadow=`0 0 0 3px ${t.accentBg}`;}} onBlur={e=>{e.target.style.borderColor="#d9dbe0";e.target.style.boxShadow="none";}}/>
          </div>
          <div>
            <label style={lbl}>Тон</label>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(TONE_LABELS).map(([k,v])=>(
                <button key={k} onClick={()=>set("tone",k)} style={{flex:1,padding:"6px 4px",borderRadius:8,border:`2px solid ${form.tone===k?t.accent:"#e6e8ec"}`,background:form.tone===k?t.accentBg:"#fff",color:form.tone===k?t.accent:"#333",fontSize:13,fontWeight:form.tone===k?600:400,cursor:"pointer"}}>{v}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={lbl}>Длина ответа</label>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {Object.entries(LENGTH_LABELS).map(([k,v])=>(
                <button key={k} onClick={()=>set("responseLength",k)} style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${form.responseLength===k?t.accent:"#e6e8ec"}`,background:form.responseLength===k?t.accentBg:"#fff",color:form.responseLength===k?t.accent:"#333",fontSize:13,fontWeight:form.responseLength===k?600:400,cursor:"pointer",textAlign:"left"}}>{v}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={lbl}>Провайдер ИИ</label>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(PROVIDERS).map(([k,p])=>(
                <button key={k} onClick={()=>{set("provider",k);set("model",p.defaultModel);}}
                  style={{flex:1,padding:"6px 4px",borderRadius:8,border:`2px solid ${form.provider===k?p.color:"#e6e8ec"}`,background:form.provider===k?`${p.color}18`:"#fff",color:form.provider===k?p.color:"#333",fontSize:13,fontWeight:form.provider===k?600:400,cursor:"pointer"}}>
                  {p.label}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label style={lbl}>Модель</label>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {Object.entries(activeProv.models).map(([k,v])=>(
                <button key={k} onClick={()=>set("model",k)}
                  style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${form.model===k?activeProv.color:"#e6e8ec"}`,background:form.model===k?`${activeProv.color}18`:"#fff",color:form.model===k?activeProv.color:"#333",fontSize:13,fontWeight:form.model===k?600:400,cursor:"pointer",textAlign:"left"}}>
                  {v}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label style={lbl}>Подпись</label>
            <input style={inp} placeholder={`С уважением, команда ${form.brandName||"бренда"}`} value={form.signature} onChange={e=>set("signature",e.target.value)}
              onFocus={e=>{e.target.style.borderColor=t.accent;e.target.style.boxShadow=`0 0 0 3px ${t.accentBg}`;}} onBlur={e=>{e.target.style.borderColor="#d9dbe0";e.target.style.boxShadow="none";}}/>
          </div>
          <div>
            <label style={lbl}>Доп. инструкции</label>
            <textarea style={{...inp,height:60,lineHeight:1.5,resize:"vertical"}} placeholder="Например: при браке — предлагать замену..." value={form.customInstructions} onChange={e=>set("customInstructions",e.target.value)}
              onFocus={e=>{e.target.style.borderColor=t.accent;e.target.style.boxShadow=`0 0 0 3px ${t.accentBg}`;}} onBlur={e=>{e.target.style.borderColor="#d9dbe0";e.target.style.boxShadow="none";}}/>
          </div>
          <PrimBtn onClick={()=>valid&&onSave(form)} disabled={!valid} grad={t.grad}>{isEdit?"Сохранить":"Начать работу →"}</PrimBtn>
        </div>
      </div>
    </div>
  );
}

function AddReviewModal({onClose,onAdd,theme}){
  const t=theme||THEMES.wb;
  const[form,setForm]=useState({productName:"",article:"",author:"",stars:0,pros:"",cons:"",comment:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const valid=form.productName.trim()&&form.stars>0;
  const handleAdd=()=>{
    if(!valid)return;
    onAdd({id:"manual_"+Date.now(),productName:form.productName.trim(),article:form.article.trim()||"—",author:form.author.trim()||"Покупатель",stars:form.stars,pros:form.pros.trim(),cons:form.cons.trim(),comment:form.comment.trim(),date:new Date().toLocaleDateString("ru-RU",{day:"numeric",month:"short",year:"numeric"}),status:"pending",source:"manual",platform:t.platform});
    onClose();
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:640,maxHeight:"92vh",overflow:"auto",animation:"slideUp 0.25s ease"}}>
        <div style={{padding:"18px 24px 14px",borderBottom:"1px solid #f0f0f5",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#fff"}}>
          <div style={{fontWeight:700,fontSize:17}}>Добавить отзыв вручную</div>
          <button onClick={onClose} style={{background:"#f0f1f4",border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:18,color:"#666",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{padding:"20px 24px 28px",display:"flex",flexDirection:"column",gap:16}}>
          <div style={{background:"#fafafa",borderRadius:12,padding:"16px 18px",border:"1px solid #f0f0f5"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Товар</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><label style={lbl}>Название <span style={{color:t.accent}}>*</span></label><input style={inp} placeholder="Мяч для собак" value={form.productName} onChange={e=>set("productName",e.target.value)}/></div>
              <div><label style={lbl}>Артикул</label><input style={inp} placeholder="251537413" value={form.article} onChange={e=>set("article",e.target.value)}/></div>
            </div>
          </div>
          <div style={{background:"#fafafa",borderRadius:12,padding:"16px 18px",border:"1px solid #f0f0f5"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Покупатель</div>
            <div><label style={lbl}>Имя</label><input style={inp} placeholder="Мария К." value={form.author} onChange={e=>set("author",e.target.value)}/><div style={{fontSize:12,color:"#999",marginTop:4}}>Обращение: <strong style={{color:"#1a1a1a"}}>{extractFirstName(form.author)||"(без обращения)"}</strong></div></div>
            <div style={{marginTop:14}}>
              <label style={lbl}>Оценка <span style={{color:t.accent}}>*</span></label>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <StarPicker value={form.stars} onChange={v=>set("stars",v)} size={30}/>
                {form.stars>0&&<span style={{fontSize:14,color:form.stars>=4?"#34C759":form.stars===3?"#FF9500":"#FF3B30",fontWeight:600}}>{form.stars>=4?"Положительный":form.stars===3?"Нейтральный":"Отрицательный"}</span>}
              </div>
            </div>
          </div>
          <div style={{background:"#fafafa",borderRadius:12,padding:"16px 18px",border:"1px solid #f0f0f5"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Текст отзыва</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><label style={lbl}><span style={{color:"#34C759"}}>✓</span> Достоинства</label><textarea style={{...inp,height:76,lineHeight:1.6,resize:"vertical"}} placeholder="Что понравилось..." value={form.pros} onChange={e=>set("pros",e.target.value)}/></div>
              <div><label style={lbl}><span style={{color:"#FF3B30"}}>✕</span> Недостатки</label><textarea style={{...inp,height:76,lineHeight:1.6,resize:"vertical"}} placeholder="Что не понравилось..." value={form.cons} onChange={e=>set("cons",e.target.value)}/></div>
              <div><label style={lbl}>Комментарий</label><textarea style={{...inp,height:76,lineHeight:1.6,resize:"vertical"}} placeholder="Дополнительный комментарий..." value={form.comment} onChange={e=>set("comment",e.target.value)}/></div>
            </div>
          </div>
          <PrimBtn onClick={handleAdd} disabled={!valid} grad={t.grad}>Добавить</PrimBtn>
        </div>
      </div>
    </div>
  );
}

function MainScreen({reviews,loading,platformError,onRefresh,onOpenSettings,feedbackCount,theme,onSwitchPlatform,settings,onSubmit,onDelete,onAddReview}){
  const t=theme||THEMES.wb;
  const[activeId,setActiveId]=useState(null);
  const[drafts,setDrafts]=useState(()=>LS.get("wb_drafts",{}));
  const[generating,setGenerating]=useState(false);
  const[generatingId,setGeneratingId]=useState(null);
  const[genError,setGenError]=useState(null);
  const[sending,setSending]=useState(false);
  const[sendingId,setSendingId]=useState(null);
  const[sendErrors,setSendErrors]=useState({});
  const[showAdd,setShowAdd]=useState(false);
  const[ratings,setRatings]=useState({});
  const genStopRef=useRef(false);

  const setRating=(id,field,val)=>setRatings(prev=>({...prev,[id]:{...prev[id],[field]:val,saved:false}}));
  const saveFeedback=async(review,ratingOverride)=>{
    const rb=ratings[review.id]||{};
    const rating=ratingOverride??rb.rating;
    if(!rating)return;
    const parts=[];
    if(review.pros)parts.push(review.pros);
    if(review.cons)parts.push(review.cons);
    if(review.comment)parts.push(review.comment);
    try{
      await apiFetch("/api/feedback",{method:"POST",body:JSON.stringify({
        reviewText:parts.join(" | "),response:drafts[review.id]||"",
        stars:review.stars,rating:rating,note:rb.note||"",
      })});
      setRatings(prev=>({...prev,[review.id]:{...prev[review.id],saved:true}}));
    }catch(e){/* silent */}
  };

  const providerLabel=PROVIDERS[settings?.provider]?.label||"AI";
  const providerColor=PROVIDERS[settings?.provider]?.color||"#10A37F";

  const filtered=reviews.filter(r=>r.platform===t.platform);
  const pending=filtered.filter(r=>r.status!=="responded");
  const done=filtered.filter(r=>r.status==="responded");
  const activeReview=reviews.find(r=>r.id===activeId)||null;

  const saveDraft=(id,text)=>{
    setDrafts(prev=>{const u={...prev,[id]:text};LS.set("wb_drafts",u);return u;});
  };
  const clearDraft=(id)=>{
    setDrafts(prev=>{const{[id]:_,...rest}=prev;LS.set("wb_drafts",rest);return rest;});
  };

  const generateOne=async(review)=>{
    setGeneratingId(review.id);
    setGenError(null);
    try{
      const data=await apiFetch("/api/generate",{method:"POST",body:JSON.stringify({review,settings})});
      saveDraft(review.id,data.text);
      return true;
    }catch(e){
      setGenError(e.message);
      return false;
    }finally{
      setGeneratingId(null);
    }
  };

  const generateAll=async()=>{
    setGenerating(true);
    setGenError(null);
    genStopRef.current=false;
    const toGen=pending.filter(r=>hasContent(r));
    for(const review of toGen){
      if(genStopRef.current)break;
      const ok=await generateOne(review);
      if(!ok)break;
    }
    setGenerating(false);
  };

  const sendAll=async()=>{
    setSending(true);
    setSendErrors({});
    const toSend=reviews.filter(r=>drafts[r.id]&&drafts[r.id].trim()&&r.status!=="responded");
    for(const review of toSend){
      setSendingId(review.id);
      try{
        if(review.source!=="manual"&&review.id){
          const sendPath=THEMES[review.platform]?.sendPath||"/api/wb/send";
          await apiFetch(sendPath,{method:"POST",body:JSON.stringify({feedback_id:review.id,text:drafts[review.id].trim()})});
        }
        onSubmit({reviewId:review.id,response:drafts[review.id]});
        clearDraft(review.id);
      }catch(e){
        setSendErrors(prev=>({...prev,[review.id]:e.message}));
      }
    }
    setSendingId(null);
    setSending(false);
  };

  const pendingWithContent=pending.filter(r=>hasContent(r));
  const draftCount=reviews.filter(r=>drafts[r.id]&&r.status!=="responded").length;
  const generatedCount=pendingWithContent.filter(r=>drafts[r.id]).length;
  const hasDrafts=draftCount>0;

  // Left panel card — same style as before
  const ReviewCard=({r})=>{
    const noContent=!hasContent(r);
    const hasDraft=!!drafts[r.id];
    const isActive=r.id===activeId;
    const isGen=generatingId===r.id;
    const isSend=sendingId===r.id;
    const sendErr=sendErrors[r.id];
    return(
      <div onClick={()=>!noContent&&setActiveId(r.id)}
        style={{...CARD,padding:24,marginBottom:20,cursor:noContent?"default":"pointer",transition:"box-shadow 0.15s,transform 0.15s",
          border:isActive?`2px solid ${t.accent}`:"1px solid #e6e8ec",
          boxShadow:isActive?`0 12px 32px ${t.accentShadow}`:"0 8px 24px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
          {r.source==="manual"
            ?<span style={{display:"inline-block",padding:"5px 14px",borderRadius:20,fontSize:13,fontWeight:600,color:"#666",background:"#f0f1f4",marginBottom:8}}>Вручную</span>
            :<PlatformBadge platform={r.platform||t.platform}/>}
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {isGen&&<span style={{display:"inline-block",animation:"spin 1s linear infinite",fontSize:16,color:providerColor}}>⟳</span>}
            {isSend&&<span style={{fontSize:12,color:"#888",animation:"pulse 1s ease infinite"}}>Отправляю...</span>}
            {!isGen&&!isSend&&hasDraft&&r.status!=="responded"&&<span style={{color:"#34C759",fontSize:18,fontWeight:700}}>✓</span>}
            {r.status==="responded"&&<span style={{background:"rgba(52,199,89,0.1)",color:"#34C759",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}><IcoCheck/>Отвечено</span>}
            <button onClick={e=>{e.stopPropagation();onDelete(r.id);}} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",display:"flex",padding:2,transition:"color 0.15s"}} onMouseEnter={e=>e.currentTarget.style.color="#FF3B30"} onMouseLeave={e=>e.currentTarget.style.color="#ccc"}><IcoTrash/></button>
          </div>
        </div>
        <div style={{fontSize:14,color:"#666",marginBottom:4}}>{r.author}</div>
        <div style={{fontWeight:600,fontSize:15,color:"#1a1a1a",marginBottom:4}}>{r.productName}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px 14px",marginBottom:12,fontSize:13,color:"#888"}}>
          {r.supplierArticle&&r.supplierArticle!=="—"&&<span>🏷 <b style={{color:"#555"}}>{r.supplierArticle}</b></span>}
          {r.article&&r.article!=="—"&&<span>📦 {r.article}</span>}
          {r.color&&<span>🎨 {r.color}</span>}
          {r.date&&<span>📝 {r.date}</span>}
          {r.orderDate&&<span>🛒 Покупка: {r.orderDate}</span>}
        </div>
        <div style={{marginBottom:14}}><Stars count={r.stars} size={24}/></div>
        {r.pros&&<div style={{background:"#f9fafc",padding:"10px 14px",borderRadius:8,fontSize:14,marginBottom:8,lineHeight:1.55}}><span style={{fontWeight:600,color:"#34C759",fontSize:12}}>Достоинства: </span>{r.pros}</div>}
        {r.cons&&<div style={{background:"#f9fafc",padding:"10px 14px",borderRadius:8,fontSize:14,marginBottom:8,lineHeight:1.55}}><span style={{fontWeight:600,color:"#FF3B30",fontSize:12}}>Недостатки: </span>{r.cons}</div>}
        {r.comment&&<div style={{background:"#f9fafc",padding:"10px 14px",borderRadius:8,fontSize:14,lineHeight:1.55}}><span style={{fontWeight:600,color:"#888",fontSize:12}}>Комментарий: </span>{r.comment}</div>}
        {noContent&&<div style={{fontSize:13,color:"#bbb",fontStyle:"italic"}}>Только оценка — ответ не требуется</div>}
        {r.photos&&r.photos.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12}}>
            {r.photos.map((url,i)=>(
              <a key={i} href={url} target="_blank" rel="noreferrer">
                <img src={url} style={{width:72,height:72,objectFit:"cover",borderRadius:8,border:"1px solid #e6e8ec",cursor:"pointer"}} onError={e=>e.target.style.display="none"}/>
              </a>
            ))}
          </div>
        )}
        {r.videoUrl&&<div style={{marginTop:8}}><a href={r.videoUrl} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:13,color:"#555",background:"#f0f1f4",padding:"6px 12px",borderRadius:8,textDecoration:"none"}}>🎬 Видео покупателя</a></div>}
        {sendErr&&<div style={{marginTop:10,padding:"8px 12px",background:"#FFF0F0",border:"1px solid #FFD0D0",borderRadius:8,fontSize:13,color:"#c0392b"}}>⚠️ {sendErr}</div>}
      </div>
    );
  };

  // Right panel
  const RightPanel=()=>{
    if(!activeReview)return(
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,color:"#bbb"}}>
        <div style={{fontSize:56}}>👈</div>
        <div style={{fontSize:16,fontWeight:600}}>Выбери отзыв слева</div>
        <div style={{fontSize:14}}>Здесь появится редактор ответа</div>
      </div>
    );
    const r=activeReview;
    const draft=drafts[r.id]||"";
    const firstName=extractFirstName(r.author);
    const MAX=1000;
    const charColor=draft.length>900?"#FF3B30":draft.length>700?"#FF9500":"#999";
    const isGen=generatingId===r.id;
    return(
      <div style={{flex:1,overflowY:"auto",padding:"24px"}}>
        {/* Review details */}
        <div style={{...CARD,padding:24,marginBottom:16}}>
          <PlatformBadge platform={r.platform||t.platform}/>
          <div style={{fontSize:14,color:"#666",marginBottom:4}}>{r.author}</div>
          <div style={{fontWeight:700,fontSize:16,color:"#1a1a1a",marginBottom:4}}>{r.productName}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 14px",marginBottom:12,fontSize:13,color:"#888"}}>
            {r.supplierArticle&&r.supplierArticle!=="—"&&<span>🏷 <b style={{color:"#555"}}>{r.supplierArticle}</b></span>}
            {r.article&&r.article!=="—"&&<span>📦 {r.article}</span>}
            {r.color&&<span>🎨 {r.color}</span>}
            {r.date&&<span>📝 {r.date}</span>}
            {r.orderDate&&<span>🛒 Покупка: {r.orderDate}</span>}
          </div>
          <div style={{marginBottom:16}}><Stars count={r.stars} size={26}/></div>
          {r.pros&&<div style={{background:"#f9fafc",padding:"12px 16px",borderRadius:10,fontSize:15,marginBottom:10,lineHeight:1.6}}><div style={{fontSize:12,fontWeight:700,color:"#34C759",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Достоинства</div>{r.pros}</div>}
          {r.cons&&<div style={{background:"#f9fafc",padding:"12px 16px",borderRadius:10,fontSize:15,marginBottom:10,lineHeight:1.6}}><div style={{fontSize:12,fontWeight:700,color:"#FF3B30",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Недостатки</div>{r.cons}</div>}
          {r.comment&&<div style={{background:"#f9fafc",padding:"12px 16px",borderRadius:10,fontSize:15,lineHeight:1.6}}><div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Комментарий</div>{r.comment}</div>}
          {r.photos&&r.photos.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12}}>
              {r.photos.map((url,i)=>(
                <a key={i} href={url} target="_blank" rel="noreferrer">
                  <img src={url} style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:"1px solid #e6e8ec"}} onError={e=>e.target.style.display="none"}/>
                </a>
              ))}
            </div>
          )}
          {r.videoUrl&&<div style={{marginTop:10}}><a href={r.videoUrl} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:13,color:"#555",background:"#f0f1f4",padding:"6px 12px",borderRadius:8,textDecoration:"none"}}>🎬 Видео покупателя</a></div>}
        </div>

        {/* Response editor */}
        <div style={{...CARD,overflow:"hidden"}}>
          <div style={{padding:"16px 24px",borderBottom:"1px solid #f0f0f5",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:"#1a1a1a"}}>Ответ продавца</div>
              <div style={{fontSize:13,color:"#888",marginTop:2}}>
                {firstName?<>Обращение: <strong style={{color:t.accent}}>{firstName}</strong></>:<span style={{color:"#bbb"}}>Имя неизвестно — без обращения</span>}
              </div>
            </div>
            <button onClick={()=>generateOne(r)} disabled={isGen||generating}
              style={{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",background:(isGen||generating)?"#f0f1f4":providerColor,color:(isGen||generating)?"#999":"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:(isGen||generating)?"not-allowed":"pointer",transition:"all 0.15s"}}>
              {isGen?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>Генерирую...</>:<><IcoSparkle/>{draft?"Перегенерировать":`Сгенерировать (${providerLabel})`}</>}
            </button>
          </div>
          <div style={{padding:"0 24px"}}>
            <textarea value={draft} onChange={e=>e.target.value.length<=MAX&&saveDraft(r.id,e.target.value)}
              placeholder="Напишите ответ вручную или нажмите «Сгенерировать»..."
              style={{width:"100%",minHeight:160,border:"none",outline:"none",resize:"none",fontSize:15,color:"#1a1a1a",lineHeight:1.6,padding:"16px 0",background:"transparent",fontFamily:"inherit"}}/>
          </div>
          <div style={{padding:"0 24px 16px",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:"#bbb"}}>Лимит: 1000 символов</span>
            <span style={{fontSize:13,color:charColor,fontVariantNumeric:"tabular-nums",fontWeight:draft.length>900?600:400}}>{draft.length} / {MAX}</span>
          </div>
          {genError&&<div style={{margin:"0 24px 16px",padding:"11px 16px",background:"#FFF0F0",border:"1px solid #FFD0D0",borderRadius:8,fontSize:14,color:"#c0392b"}}>{genError}</div>}
          {draft&&(()=>{
            const fb=ratings[r.id]||{};
            const starColor=(n)=>n<=(fb.rating||0)?(fb.rating<=2?"#FF3B30":fb.rating<=3?"#FF9500":"#34C759"):"#d9dbe0";
            return(
              <div style={{margin:"0 24px 16px",padding:"14px 16px",background:"#f9fafc",borderRadius:10,border:"1px solid #f0f0f5"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Оцените качество ответа</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:fb.rating>0?10:0}}>
                  {[1,2,3,4,5].map(n=>(
                    <button key={n} onClick={()=>{
                      setRating(r.id,"rating",n);
                      if(n>=4)saveFeedback(r,n);
                    }}
                      style={{background:"none",border:"none",cursor:"pointer",padding:2,lineHeight:1,fontSize:26,color:starColor(n),transition:"color 0.1s"}}>★</button>
                  ))}
                  {fb.saved&&<span style={{fontSize:13,color:"#34C759",fontWeight:600,marginLeft:4}}>✓ Сохранено</span>}
                </div>
                {fb.rating>0&&fb.rating<=3&&(
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    <input value={fb.note||""} onChange={e=>setRating(r.id,"note",e.target.value)}
                      placeholder="Что не так? (фраза, стиль, логика...)"
                      style={{width:"100%",padding:"7px 10px",border:"1.5px solid #e6e8ec",borderRadius:8,fontSize:13,color:"#1a1a1a",background:"#fff",fontFamily:"inherit"}}/>
                    <button onClick={()=>saveFeedback(r)} style={{alignSelf:"flex-start",padding:"6px 16px",background:"#FF9500",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                      Сохранить замечание
                    </button>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      </div>
    );
  };

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:t.grad,padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0"}}>
          <span style={{fontSize:20}}>💬</span>
          <span style={{color:"#fff",fontWeight:700,fontSize:16}}>ReviewBot</span>
          {feedbackCount>0&&<span style={{background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:12}}>🎓 {feedbackCount}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"13px 0"}}>
          <PlatformSwitch current={t.platform} onChange={onSwitchPlatform}/>
          {/* Generate All */}
          <button onClick={generating?()=>{genStopRef.current=true;}:generateAll} disabled={loading||(!generating&&pendingWithContent.length===0)}
            style={{padding:"7px 14px",background:generating?"rgba(255,80,80,0.25)":"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:8,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all 0.15s"}}>
            {generating
              ?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>{`${generatedCount}/${pendingWithContent.length} — Стоп`}</>
              :<><IcoSparkle/>Сгенерировать все{pendingWithContent.length>0?` (${pendingWithContent.length})`:""}</>}
          </button>
          {/* Send All */}
          <button onClick={sendAll} disabled={sending||!hasDrafts}
            style={{padding:"7px 14px",background:hasDrafts&&!sending?"rgba(255,255,255,0.95)":"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:8,color:hasDrafts&&!sending?t.accent:"rgba(255,255,255,0.5)",fontSize:13,fontWeight:600,cursor:hasDrafts&&!sending?"pointer":"not-allowed",display:"flex",alignItems:"center",gap:6,transition:"all 0.15s"}}>
            {sending?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>Отправляю...</>:<><IcoSend/>{`Отправить все${draftCount>0?` (${draftCount})`:""}`}</>}
          </button>
          <button onClick={onOpenSettings} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,padding:"7px 9px",color:"#fff",cursor:"pointer",display:"flex"}}><IcoSettings/></button>
        </div>
      </div>

      {/* Split panel */}
      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
        {/* Left panel */}
        <div style={{width:460,borderRight:"1px solid #e0e0ea",overflowY:"auto",background:"#f5f6f8",flexShrink:0}}>
          <div style={{padding:"16px 16px 0"}}>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button onClick={onRefresh} disabled={loading}
                style={{flex:2,padding:"10px 14px",background:loading?"#e6e8ec":t.grad,color:loading?"#999":"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                {loading?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>Загружаю...</>:<>{t.loadLabel}</>}
              </button>
              <button onClick={()=>setShowAdd(true)}
                style={{flex:1,padding:"10px 10px",background:"#fff",border:`2px dashed ${t.accent}`,borderRadius:10,color:t.accent,fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}
                onMouseEnter={e=>e.currentTarget.style.background=t.accentBg}
                onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                <IcoPlus/>Вручную
              </button>
            </div>
            {platformError&&<div style={{padding:"10px 14px",background:"#FFF0F0",border:"1px solid #FFD0D0",borderRadius:10,fontSize:13,color:"#c0392b",marginBottom:12}}>⚠️ {platformError}</div>}
            {genError&&!activeId&&<div style={{padding:"10px 14px",background:"#FFF0F0",border:"1px solid #FFD0D0",borderRadius:10,fontSize:13,color:"#c0392b",marginBottom:12}}>⚠️ {genError}</div>}
            {pending.length>0&&<div style={{fontSize:11,fontWeight:700,color:"#999",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Ожидают · {pending.filter(r=>hasContent(r)).length} / {pending.length}</div>}
          </div>
          <div style={{padding:"0 16px 16px"}}>
            {pending.map(r=><ReviewCard key={r.id} r={r}/>)}
            {done.length>0&&<>
              <div style={{fontSize:11,fontWeight:700,color:"#999",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10,marginTop:4}}>Отвечено · {done.length}</div>
              {done.map(r=><ReviewCard key={r.id} r={r}/>)}
            </>}
            {pending.length===0&&done.length===0&&!loading&&(
              <div style={{textAlign:"center",padding:"60px 20px",color:"#999"}}>
                <div style={{fontSize:44,marginBottom:14}}>📭</div>
                <div style={{fontSize:16,fontWeight:600,marginBottom:6}}>Отзывов пока нет</div>
                <div style={{fontSize:14}}>Нажми «{t.loadLabel.replace("↓ ","")}»</div>
              </div>
            )}
          </div>
        </div>

        {/* Right panel */}
        <div style={{flex:1,display:"flex",flexDirection:"column",background:"#f0f1f5",overflowY:"auto"}}>
          {RightPanel()}
        </div>
      </div>

      {showAdd&&<AddReviewModal onClose={()=>setShowAdd(false)} onAdd={r=>{onAddReview(r);setShowAdd(false);}} theme={t}/>}
    </div>
  );
}

function App(){
  const[screen,setScreen]=useState("loading");
  const[settings,setSettings]=useState(null);
  const[reviews,setReviews]=useState([]);
  const[editSettings,setEditSettings]=useState(false);
  const[loading,setLoading]=useState(false);
  const[platformError,setPlatformError]=useState(null);
  const[feedbackCount,setFeedbackCount]=useState(0);
  const[platformKey,setPlatformKey]=useState(()=>LS.get("active_platform","wb"));

  const theme=THEMES[platformKey]||THEMES.wb;

  useEffect(()=>{
    const s=LS.get("wb_settings",null);
    const r=LS.get("wb_reviews_local",[]);
    setReviews(r);
    if(!s){setScreen("setup");return;}
    const migrated=s.provider?s:{...s,provider:"openai"};
    setSettings(migrated);setScreen("main");
    fetch(API+"/api/feedback/stats").then(r=>r.json()).then(d=>{if(d.total)setFeedbackCount(d.total);}).catch(()=>{});
  },[]);

  const handleSaveSettings=(s)=>{setSettings(s);LS.set("wb_settings",s);setEditSettings(false);setScreen("main");};
  const handleSwitchPlatform=(p)=>{setPlatformKey(p);LS.set("active_platform",p);setPlatformError(null);};

  const handleRefresh=async()=>{
    setLoading(true);setPlatformError(null);
    try{
      const data=await apiFetch(theme.apiPath);
      const manual=reviews.filter(r=>r.source==="manual");
      const fresh=data.reviews.map(r=>({...r,source:theme.platform,platform:theme.platform}));
      const merged=[...fresh,...manual];
      setReviews(merged);LS.set("wb_reviews_local",merged);
      if(data.count===0)setPlatformError("Новых неотвеченных отзывов нет");
    }catch(e){setPlatformError(e.message);}
    setLoading(false);
  };

  const handleAddReview=(r)=>{const u=[r,...reviews];setReviews(u);LS.set("wb_reviews_local",u);};
  const handleDeleteReview=(id)=>{const u=reviews.filter(r=>r.id!==id);setReviews(u);LS.set("wb_reviews_local",u);};
  const handleSubmit=({reviewId,response})=>{
    const u=reviews.map(r=>r.id===reviewId?{...r,status:"responded",sentResponse:response}:r);
    setReviews(u);LS.set("wb_reviews_local",u);
    fetch(API+"/api/feedback/stats").then(r=>r.json()).then(d=>{if(d.total)setFeedbackCount(d.total);}).catch(()=>{});
  };

  if(screen==="loading")return(
    <div style={{minHeight:"100vh",background:"#f5f6f8",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:56,height:56,borderRadius:16,background:theme.grad,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28}}>💬</div>
        <div style={{color:"#999",fontSize:14,animation:"pulse 1.5s ease infinite"}}>Загрузка...</div>
      </div>
    </div>
  );
  if(screen==="setup"||editSettings)return<SetupScreen initial={editSettings?settings:null} isEdit={editSettings} onSave={handleSaveSettings} onBack={()=>setEditSettings(false)} theme={theme}/>;
  return<MainScreen
    reviews={reviews}
    loading={loading}
    platformError={platformError}
    onRefresh={handleRefresh}
    onOpenSettings={()=>setEditSettings(true)}
    feedbackCount={feedbackCount}
    theme={theme}
    onSwitchPlatform={handleSwitchPlatform}
    settings={settings}
    onSubmit={handleSubmit}
    onDelete={handleDeleteReview}
    onAddReview={handleAddReview}
  />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
